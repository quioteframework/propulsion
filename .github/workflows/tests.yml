name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (no Docker)
    runs-on: ubuntu-latest
    # Non-blocking: under PROPULSION_SKIP_INTEGRATION=1, ~77 tests error out
    # because they depend on the Docker-built fixtures but aren't individually
    # guarded with a markTestSkipped()/class_exists() check the way most of the
    # suite is (see KNOWN_ISSUES.md). The "integration" job below runs the same
    # suite with Docker available and is blocking. Flip this to false once the
    # remaining no-Docker guards are added.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_sqlite, pdo_pgsql, pdo_mysql, mbstring, xml, simplexml
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit (unit tier only)
        working-directory: test
        env:
          # Skips every test that needs the shared Postgres testcontainer (Bookstore/
          # Cms/Namespace/Schemas fixtures and anything built on them -- ~1100+ test
          # methods, markTestSkipped() individually) instead of spending the time to
          # pull postgres:latest and build fixtures just for a fast smoke-test job.
          # Full coverage, including those tests, runs in the "integration" job below.
          PROPULSION_SKIP_INTEGRATION: '1'
        run: ../vendor/bin/phpunit -c phpunit.xml

  integration:
    name: Full suite (with Docker/Postgres)
    runs-on: ubuntu-latest
    # Blocking: this is the source of truth for suite health (see
    # KNOWN_ISSUES.md).
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo, pdo_sqlite, pdo_pgsql, pdo_mysql, mbstring, xml, simplexml
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run full PHPUnit suite (starts its own Postgres testcontainer)
        working-directory: test
        run: ../vendor/bin/phpunit -c phpunit.xml
