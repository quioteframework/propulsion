# Overrides for building the bookstore test fixtures via bin/propulsion
# (invoked from the repository root, not from inside test/fixtures/bookstore/
# the way the legacy Phing propel-gen entry point is) -- these behavior class
# dot-paths are relative to the current working directory, so they drop the
# leading "../" that build.properties uses for the Phing path.
propel.behavior.test_all_hooks.class = test.tools.helpers.bookstore.behavior.Testallhooksbehavior
propel.behavior.do_nothing.class = test.tools.helpers.bookstore.behavior.DonothingBehavior
propel.behavior.add_class.class = test.tools.helpers.bookstore.behavior.AddClassBehavior
