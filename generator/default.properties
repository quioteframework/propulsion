propel.behavior.alternative_coding_standards.class = Propulsion\Generator\Behavior\AlternativeCodingStandardsBehavior
propel.behavior.soft_delete.class = Propulsion\Generator\Behavior\SoftDeleteBehavior
propel.behavior.auto_add_pk.class = Propulsion\Generator\Behavior\AutoAddPkBehavior
propel.behavior.nested_set.class = Propulsion\Generator\Behavior\NestedSet\NestedSetBehavior
propel.behavior.sortable.class = Propulsion\Generator\Behavior\Sortable\SortableBehavior
propel.behavior.sluggable.class = Propulsion\Generator\Behavior\Sluggable\SluggableBehavior
propel.behavior.concrete_inheritance.class = Propulsion\Generator\Behavior\ConcreteInheritance\ConcreteInheritanceBehavior
