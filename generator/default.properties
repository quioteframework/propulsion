# -------------------------------------------------------------------
#
#  D E F A U L T   P R O P E R T I E S
#
# -------------------------------------------------------------------
# This file sets default properties.  You can override any of these
# by specifying your new value in the build.properties file for your
# project or a top-level build.properties file. Either way, you
# should not need to edit this file.
# -------------------------------------------------------------------


# -------------------------------------------------------------------
#
#  B A S I C   P R O P E R T I E S
#
# -------------------------------------------------------------------

propel.version = 1.6.2-dev

propel.home = .

# propel.project and propel.project.dir are intentionally NOT defaulted here --
# see the matching <property> tasks at the top of build-propel.xml for why.
#
# propel.targetPackage is, for the same reason, NOT defaulted here as
# "${propel.project}" either: the modern `bin/propulsion model:build` console path
# (Propulsion\Generator\Manager\ModelManager) never sets propel.project at all (it
# has no "project" concept -- see --namespace/--output-dir instead), so that template
# would resolve to nothing and leave the literal "${propel.project}" as the target
# package for any schema lacking its own `package` attribute. build-propel.xml
# defaults propel.targetPackage from propel.project itself, the same way it does for
# propel.project.dir, preserving that convenience for the Phing path (which always
# requires propel.project) without the console path inheriting it.
propel.database =
propel.targetPackage =
propel.runOnlyOnSchemaChange = false

# Default behavior settings
#
# Unset (rather than "php5") so GeneratorConfig::getBuilderClassname() falls
# straight through to the unsuffixed propel.builder.*.class defaults below,
# which (since Phase 3, see KNOWN_ISSUES.md) are the modern builders formerly
# suffixed .php84. Explicitly set this to "php5" to opt back into the legacy
# PHP5* builders via the propel.builder.*.php5.class overrides.
propel.targetPlatform =
propel.packageObjectModel = false
propel.useDateTimeClass = true
propel.dateTimeClass = DateTime

propel.schema.validate = true
propel.schema.transform  = false

propel.schema.autoPackage = false
propel.schema.autoNamespace = false
propel.schema.autoPrefix = false

# controls what type of joins will be used in the doSelectJoin*() peer methods,
# if set to true, LEFT JOINS will be used, INNER JOINS otherwise
# see ticket #491, #588
propel.useLeftJoinsInDoJoinMethods = true

# -------------------------------------------------------------------
#
#  D A T A B A S E   S E T T I N G S
#
# -------------------------------------------------------------------

propel.database.url =
propel.database.buildUrl = ${propel.database.url}
propel.database.createUrl = ${propel.database.buildUrl}

propel.database.driver =

propel.database.schema =
propel.database.encoding =
propel.database.manualCreation = false

# if these arent blank then when we try to connect with insert-sql to a database
# that doesnt require them and it isnt in the build.properties it sends
# the ${blah} for the username and password
propel.database.user =
propel.database.password =

# -------------------------------------------------------------------
#
#  D A T A B A S E  T O  X M L  S E T T I N G S
#
# -------------------------------------------------------------------

propel.samePhpName = false
propel.addVendorInfo = false
propel.addValidators = none

# -------------------------------------------------------------------
#
#  T E M P L A T E   V A R I A B L E S
#
# -------------------------------------------------------------------

propel.addGenericAccessors = true
propel.addGenericMutators = true
propel.addSaveMethod = true
propel.addTimeStamp = false
propel.addValidateMethod = true
propel.addIncludes = false
propel.addHooks = true
propel.basePrefix = Base
propel.saveException = PropulsionException
propel.emulateForeignKeyConstraints = false

# Identifier quoting may result in undesired behavior (especially in Postgres),
# it can be disabled in DDL by setting this property to true in your build.properties file.
propel.disableIdentifierQuoting = false

# These are the default formats that will be used when fetching values
# from temporal columns in Propulsion.  You can always specify these when
# calling the methods directly, but for methods like getByName()
# it is nice to change the defaults.

propel.defaultTimeStampFormat = Y-m-d H:i:s
propel.defaultTimeFormat = %X
propel.defaultDateFormat = %x

propel.namespace.om = OM
propel.namespace.map = Map
propel.namespace.autoPackage = true

# -------------------------------------------------------------------
#
#  D I R E C T O R I E S
#
# -------------------------------------------------------------------

propel.conf.dir = ${propel.project.dir}
propel.schema.dir = ${propel.project.dir}
propel.templatePath = ${propel.home}/templates

propel.output.dir = ${propel.project.dir}/build
propel.php.dir = ${propel.output.dir}/classes
propel.phpconf.dir = ${propel.output.dir}/conf
propel.sql.dir = ${propel.output.dir}/sql
propel.migration.dir = ${propel.output.dir}/migrations

propel.graph.dir = ${propel.output.dir}/graph

propel.dbd2propel.dir = ${propel.project.dir}/dbd

# -------------------------------------------------------------------
#
#  D E F A U L T   F I L E   N A M ES
#
# -------------------------------------------------------------------

# propel.sqlfile

propel.runtime.conf.file = runtime-conf.xml
propel.runtime.phpconf.file = ${propel.project}-conf.php
propel.runtime.phpconf-classmap.file = classmap-${propel.runtime.phpconf.file}
propel.default.schema.basename = schema

propel.buildtime.conf.file = buildtime-conf.xml

# Can't use because of inconsistencies in where the files
# are named (some from build-propel.xml, but some from within templates)
# propel.default.data.basename = ${propel.project}-data

propel.schema.xsd.file = ${propel.home}/resources/xsd/database.xsd
propel.schema.xsl.file = ${propel.home}/resources/xsl/database.xsl

propel.dbd2propel.xsl.file = ${propel.home}/resources/xsl/dbd2propel.xsl

# -------------------------------------------------------------------
#
#  I N C L U D E   A N D   E X C L U D E   S E T T I N G S
#
# -------------------------------------------------------------------

propel.schema.sql.includes = *schema.xml
propel.schema.sql.excludes =
propel.schema.doc.includes = *schema.xml
propel.schema.doc.excludes =
propel.schema.create-db.includes = *schema.xml
propel.schema.create-db.excludes =
propel.schema.init-sql.includes = *schema.xml
propel.schema.init-sql.excludes = id-table-schema.xml
propel.schema.om.includes = *schema.xml
propel.schema.om.excludes = id-table-schema.xml
propel.schema.datadtd.includes = *schema.xml
propel.schema.datadtd.excludes = id-table-schema.xml
propel.dbd2propel.includes = *.xml

# -------------------------------------------------------------------
#
#  M A P P E R   S E T T I N G S
#
# -------------------------------------------------------------------

# (note: data xml files are selected based on datadbmap file)
propel.datasql.mapper.from = *.xml
propel.datasql.mapper.to = *.sql

propel.datadump.mapper.from = *schema.xml
propel.datadump.mapper.to = *data.xml

propel.datadtd.mapper.from = *.xml
propel.datadtd.mapper.to = *.dtd

propel.sql.mapper.from = *.xml
propel.sql.mapper.to = *.sql

# -------------------------------------------------------------------
#
#  M I G R A T I O N    S E T T I N G S
#
# -------------------------------------------------------------------

propel.migration.editor =
propel.migration.table = propulsion_migration
propel.migration.caseInsensitive = true

# -------------------------------------------------------------------
#
#  B U I L D E R    S E T T I N G S
#
# -------------------------------------------------------------------

# Object Model builders
#
# The PHP5 builders (PHP5PeerBuilder, PHP5ObjectBuilder, PHP5TableMapBuilder,
# PHP5QueryBuilder, the node/nestedset family, and their .php5.class overrides)
# have been removed from the codebase entirely -- see archaeology/php5-builders/
# for the archived files and KNOWN_ISSUES.md for the fallout. Every
# propel.builder.*.class key below is now unconditionally the modern (formerly
# PHP84-suffixed) builder; propel.targetPlatform is effectively vestigial (there
# is no alternate builder set left to select), kept only because
# GeneratorConfig::getBuilderClassname() still supports platform-suffixed
# overrides in general. The .php84.class entries are kept as an explicit,
# redundant alias for anyone who still passes targetPlatform=php84 explicitly
# (e.g. the namespaced test fixture does).
#
# NOTE: peer/object/objectstub/peerstub/objectmultiextend and the node/nestedset
# family were, before this removal, considered "not ready to be default" because
# of real completeness gaps relative to the removed PHP5 builders (temporal
# column defaults needed a fix; the node/nestedset family in particular is full
# of literal `{ /* Implementation */ }` no-op stub methods -- it's unclear
# nested sets, specifically, have ever fully worked in this codebase). They are
# default now anyway, since there's nothing left to fall back to. See
# KNOWN_ISSUES.md for current known breakage.
propel.builder.peer.class = Propulsion\Generator\Builder\OM\PeerBuilder
propel.builder.object.class = Propulsion\Generator\Builder\OM\ObjectBuilder
propel.builder.objectstub.class = Propulsion\Generator\Builder\OM\ExtensionObjectBuilder
propel.builder.peerstub.class = Propulsion\Generator\Builder\OM\ExtensionPeerBuilder

propel.builder.objectmultiextend.class = Propulsion\Generator\Builder\OM\MultiExtendObjectBuilder

propel.builder.tablemap.class = Propulsion\Generator\Builder\OM\TableMapBuilder
propel.builder.query.class = Propulsion\Generator\Builder\OM\QueryBuilder
propel.builder.querystub.class = Propulsion\Generator\Builder\OM\ExtensionQueryBuilder
propel.builder.querystub.php84.class = Propulsion\Generator\Builder\OM\ExtensionQueryBuilder

propel.builder.interface.class = Propulsion\Generator\Builder\OM\InterfaceBuilder

propel.builder.node.class = Propulsion\Generator\Builder\OM\NodeBuilder
propel.builder.nodepeer.class = Propulsion\Generator\Builder\OM\NodePeerBuilder
propel.builder.nodestub.class = Propulsion\Generator\Builder\OM\ExtensionNodeBuilder
propel.builder.nodepeerstub.class = Propulsion\Generator\Builder\OM\ExtensionNodePeerBuilder

propel.builder.nestedset.class = Propulsion\Generator\Builder\OM\NestedSetBuilder
propel.builder.nestedsetpeer.class = Propulsion\Generator\Builder\OM\NestedSetPeerBuilder

propel.builder.queryinheritance.class = Propulsion\Generator\Builder\OM\QueryInheritanceBuilder
propel.builder.queryinheritancestub.class = Propulsion\Generator\Builder\OM\ExtensionQueryInheritanceBuilder

# PHP 8.4 Object Model builders (explicit alias for the (now unconditionally default) builders above)
propel.builder.peer.php84.class = Propulsion\Generator\Builder\OM\PeerBuilder
propel.builder.object.php84.class = Propulsion\Generator\Builder\OM\ObjectBuilder
propel.builder.objectstub.php84.class = Propulsion\Generator\Builder\OM\ExtensionObjectBuilder
propel.builder.peerstub.php84.class = Propulsion\Generator\Builder\OM\ExtensionPeerBuilder
propel.builder.tablemap.php84.class = Propulsion\Generator\Builder\OM\TableMapBuilder
propel.builder.query.php84.class = Propulsion\Generator\Builder\OM\QueryBuilder
propel.builder.node.php84.class = Propulsion\Generator\Builder\OM\NodeBuilder
propel.builder.nodepeer.php84.class = Propulsion\Generator\Builder\OM\NodePeerBuilder
propel.builder.nestedset.php84.class = Propulsion\Generator\Builder\OM\NestedSetBuilder
propel.builder.nestedsetpeer.php84.class = Propulsion\Generator\Builder\OM\NestedSetPeerBuilder
propel.builder.objectmultiextend.php84.class = Propulsion\Generator\Builder\OM\MultiExtendObjectBuilder
propel.builder.nodestub.php84.class = Propulsion\Generator\Builder\OM\ExtensionNodeBuilder
propel.builder.nodepeerstub.php84.class = Propulsion\Generator\Builder\OM\ExtensionNodePeerBuilder
propel.builder.interface.php84.class = Propulsion\Generator\Builder\OM\InterfaceBuilder

propel.builder.pluralizer.class = Propulsion\Generator\Builder\Util\DefaultEnglishPluralizer

# SQL builders
#
# Explicit per-database entries, same reasoning as propel.reverse.parser.*.class
# above: Builder/SQL/'s directory/namespace casing (MySQL, PgSQL, MSSQL, ...)
# never matches propel.database's lowercase values, so a "${propel.database}"
# template can't resolve to a real class for any database.

propel.builder.datasql.mysql.class = Propulsion\Generator\Builder\SQL\MySQL\MysqlDataSQLBuilder
propel.builder.datasql.pgsql.class = Propulsion\Generator\Builder\SQL\PgSQL\PgsqlDataSQLBuilder
propel.builder.datasql.mssql.class = Propulsion\Generator\Builder\SQL\MSSQL\MssqlDataSQLBuilder
propel.builder.datasql.sqlsrv.class = Propulsion\Generator\Builder\SQL\Sqlsrv\SqlsrvDataSQLBuilder
propel.builder.datasql.oracle.class = Propulsion\Generator\Builder\SQL\Oracle\OracleDataSQLBuilder

propel.builder.datasql.class = ${propel.builder.datasql.${propel.database}.class}

# Platform classes

# Individual platform class mappings for proper capitalization
propel.platform.mysql.class = Propulsion\Generator\Platform\MysqlPlatform
propel.platform.pgsql.class = Propulsion\Generator\Platform\PgsqlPlatform
propel.platform.sqlite.class = Propulsion\Generator\Platform\SqlitePlatform
propel.platform.oracle.class = Propulsion\Generator\Platform\OraclePlatform
propel.platform.mssql.class = Propulsion\Generator\Platform\MssqlPlatform
propel.platform.sqlsrv.class = Propulsion\Generator\Platform\SqlsrvPlatform

# Default platform class using dynamic property expansion
propel.platform.class = ${propel.platform.${propel.database}.class}

# Schema Parser (reverse-engineering) classes
#
# Explicit per-database entries, same pattern as propel.platform.*.class above --
# NOT a single "${propel.database}"-templated path, because the Reverse/ directory
# and namespace casing (MySQL, PgSQL, MSSQL, SQLite, ...) doesn't match
# propel.database's own lowercase values (mysql, pgsql, mssql, sqlite, ...), so a
# generic per-character-cased template can never resolve to a real class for any
# database.

propel.reverse.parser.mysql.class = Propulsion\Generator\Reverse\MySQL\MysqlSchemaParser
# PgsqlSchemaParser (not V12Plus) queries pg_attrdef.adsrc directly, a column
# dropped in Postgres 12 (replaced by pg_get_expr(adbin, adrelid), which is what
# PgsqlSchemaParserV12Plus uses) -- this repo's fixtures/CI run against
# postgres:latest, so V12Plus is the one that actually works here.
propel.reverse.parser.pgsql.class = Propulsion\Generator\Reverse\PgSQL\PgsqlSchemaParserV12Plus
propel.reverse.parser.sqlite.class = Propulsion\Generator\Reverse\SQLite\SqliteSchemaParser
propel.reverse.parser.mssql.class = Propulsion\Generator\Reverse\MSSQL\MssqlSchemaParser
propel.reverse.parser.sqlsrv.class = Propulsion\Generator\Reverse\Sqlsrv\SqlsrvSchemaParser
propel.reverse.parser.oracle.class = Propulsion\Generator\Reverse\Oracle\OracleSchemaParser

propel.reverse.parser.class = ${propel.reverse.parser.${propel.database}.class}

# -------------------------------------------------------------------
#
#  M Y S Q L   S P E C I F I C   S E T T I N G S
#
# -------------------------------------------------------------------

# Default table type
propel.mysql.tableType = MyISAM
# Keyword used to specify table type. MYSQL < 5 should use TYPE instead
propel.mysql.tableEngineKeyword = ENGINE

# -------------------------------------------------------------------
#
#  O R A C L E   S P E C I F I C   S E T T I N G S
#
# -------------------------------------------------------------------

# Pattern for sequences which will be used for autoincrement columns
propel.oracle.autoincrementSequencePattern = ${table}_SEQ

